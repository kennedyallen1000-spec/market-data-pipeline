<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAQP Dashboard - Multi-Asset Quantum Pipeline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(71, 85, 105, 0.5);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95em;
    }

    .status {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      background: rgba(30, 41, 59, 0.8);
      border-radius: 8px;
      border: 1px solid rgba(71, 85, 105, 0.3);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(59, 130, 246, 0.5);
      transform: translateY(-2px);
    }

    .card h2 {
      font-size: 1.1em;
      margin-bottom: 15px;
      color: #60a5fa;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(71, 85, 105, 0.3);
    }

    .metric:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .metric-label {
      color: #94a3b8;
      font-size: 0.9em;
    }

    .metric-value {
      font-weight: 600;
      color: #f1f5f9;
    }

    .regime {
      font-size: 1.3em;
      font-weight: bold;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      background: rgba(59, 130, 246, 0.2);
      border: 2px solid rgba(59, 130, 246, 0.5);
      color: #60a5fa;
    }

    .opportunities {
      margin-top: 30px;
    }

    .opportunities h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    .opportunity {
      background: rgba(30, 41, 59, 0.8);
      border-left: 4px solid #3b82f6;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .opportunity:hover {
      border-left-color: #60a5fa;
      background: rgba(30, 41, 59, 1);
    }

    .opportunity.sell {
      border-left-color: #ef4444;
    }

    .opportunity.sell:hover {
      border-left-color: #f87171;
    }

    .opportunity-header {
      display: flex;
      align-items: center;
      gap: 15px;
      flex: 1;
    }

    .symbol {
      font-size: 1.3em;
      font-weight: bold;
      color: #60a5fa;
      min-width: 60px;
    }

    .opportunity-info {
      flex: 1;
    }

    .opportunity-reason {
      color: #94a3b8;
      font-size: 0.9em;
      margin-top: 8px;
    }

    .action {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9em;
    }

    .action.buy {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.5);
    }

    .action.sell {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.5);
    }

    .confidence {
      text-align: right;
    }

    .confidence-label {
      color: #94a3b8;
      font-size: 0.8em;
    }

    .confidence-value {
      font-size: 1.3em;
      font-weight: bold;
      color: #60a5fa;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: #64748b;
      border-top: 1px solid rgba(71, 85, 105, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 MAQP Dashboard</h1>
      <p class="subtitle">Multi-Asset Quantum Pipeline - Renaissance Technologies Framework</p>
      <div class="status">
        <div class="status-item">
          <div class="status-dot"></div>
          <span>System Online</span>
        </div>
        <div class="status-item" id="last-update">
          <span>Loading...</span>
        </div>
      </div>
    </header>

    <div id="content">
      <div class="loading">⏳ Loading analysis...</div>
    </div>

    <footer>
      <p>Powered by Claude AI • Anthropic 2026</p>
    </footer>
  </div>

  <script>
    async function loadDashboard() {
      try {
        const response = await fetch('/api/analysis');
        if (!response.ok) {
          throw new Error('Failed to load analysis');
        }

        const data = await response.json();
        renderDashboard(data);
      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="error">⚠️ Error loading dashboard: ${error.message}</div>
        `;
      }
    }

    function renderDashboard(data) {
      const regime = data.regime || 'UNKNOWN';
      const opportunities = data.opportunities || [];
      const riskAttr = data.risk_attribution || {};

      let html = `
        <div class="grid">
          <div class="card">
            <h2>📊 Market Regime</h2>
            <div class="regime">${regime}</div>
          </div>
          
          <div class="card">
            <h2>📈 Risk Metrics</h2>
            <div class="metric">
              <span class="metric-label">VaR (95%)</span>
              <span class="metric-value">${(riskAttr.var_95 || 0).toFixed(2)}%</span>
            </div>
            <div class="metric">
              <span class="metric-label">Max Drawdown</span>
              <span class="metric-value">${(riskAttr.max_drawdown_risk || 0).toFixed(2)}%</span>
            </div>
          </div>

          <div class="card">
            <h2>🎯 Analysis</h2>
            <div class="metric">
              <span class="metric-label">Opportunities Found</span>
              <span class="metric-value">${opportunities.length}</span>
            </div>
          </div>
        </div>

        <div class="opportunities">
          <h2>🚀 Top Trading Opportunities</h2>
      `;

      opportunities.slice(0, 10).forEach((opp, idx) => {
        const actionClass = opp.action?.includes('BUY') ? 'buy' : 'sell';
        const confidence = (opp.confidence * 100).toFixed(0);

        html += `
          <div class="opportunity ${actionClass}">
            <div class="opportunity-header">
              <div class="symbol">${opp.symbol}</div>
              <div class="opportunity-info">
                <div>${opp.action}</div>
                <div class="opportunity-reason">${opp.reason}</div>
              </div>
            </div>
            <div class="action ${actionClass}">${opp.action}</div>
            <div class="confidence">
              <div class="confidence-label">Confidence</div>
              <div class="confidence-value">${confidence}%</div>
            </div>
          </div>
        `;
      });

      html += '</div>';

      document.getElementById('content').innerHTML = html;
      document.getElementById('last-update').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    // Load on page load and refresh every 60 seconds
    loadDashboard();
    setInterval(loadDashboard, 60000);
  </script>
</body>
</html>
